<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>紐西蘭南島 旅遊規劃</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F7F5F0;--panel:#fff;--text:#1A1A18;--muted:#6B6B65;--border:#E0DDD6;--accent:#2C6E49;--accent2:#E76F51}
html,body{height:100%;overflow:hidden;font-family:'Helvetica Neue',Arial,'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
/* topbar */
.topbar{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;z-index:200}
.logo{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}.logo span{color:var(--accent2)}
.trip-meta{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.trip-meta label{font-size:11px;color:var(--muted);white-space:nowrap}
.trip-meta input{border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;background:var(--bg);color:var(--text)}
.sync-pill{display:flex;align-items:center;gap:5px;border-left:1px solid var(--border);padding-left:8px;margin-left:4px;flex-shrink:0}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.sdot.ok{background:#2C6E49}.sdot.err{background:#DC2626}.sdot.ing{background:#F59E0B;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.slbl{font-size:11px;color:var(--muted);white-space:nowrap}
/* layout */
.layout{display:flex;height:calc(100vh - 52px);position:relative}
.lpanel{width:300px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:10}
.lpanel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ltab{flex:1;padding:8px 0;font-size:12px;text-align:center;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent}
.ltab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.map-wrap{flex:1;position:relative;overflow:visible}
#map{width:100%;height:100%}
.rdrawer{width:0;overflow:hidden;background:var(--panel);border-left:1px solid var(--border);transition:width .25s ease;display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.rdrawer.open{width:340px}
.rdrawer-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:200;background:var(--panel);border:1px solid var(--border);border-right:none;border-radius:8px 0 0 8px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:-2px 0 8px rgba(0,0,0,.06);transition:right .25s ease}
.rdrawer-toggle span{font-size:10px;color:var(--muted);writing-mode:vertical-rl;letter-spacing:1px}
.rtarrow{font-size:12px;color:var(--muted)}
/* map ui */
.mleg{position:absolute;top:10px;right:10px;z-index:100;background:rgba(255,255,255,.93);border-radius:8px;border:1px solid var(--border);padding:8px 10px;font-size:11px;line-height:1.9;pointer-events:none}
.ldot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.mtip{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(255,255,255,.9);border-radius:20px;border:1px solid var(--border);padding:5px 13px;font-size:11px;color:var(--muted);white-space:nowrap;pointer-events:none}
.day-filter-bar{position:absolute;top:10px;left:10px;z-index:100;display:flex;gap:5px;flex-wrap:wrap;max-width:260px}
.day-pill{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.9);cursor:pointer;color:var(--muted);white-space:nowrap}
.day-pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
/* spots */
.frow{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.chip{font-size:11px;padding:3px 8px;border-radius:12px;border:1px solid var(--border);cursor:pointer;background:none;color:var(--muted)}
.chip.on{background:var(--text);color:#fff;border-color:var(--text)}
.slist{flex:1;overflow-y:auto;padding:6px}
.sc{padding:8px 10px;border-radius:8px;border:1px solid var(--border);margin-bottom:5px;cursor:grab;background:var(--panel);user-select:none;position:relative}
.sc:hover{border-color:var(--accent);box-shadow:0 0 0 2px rgba(44,110,73,.08)}
.sc.hl{border-color:var(--accent);box-shadow:0 0 0 3px rgba(44,110,73,.13)}
.sc.dragging{opacity:.4}
.sc-top{display:flex;align-items:flex-start;gap:4px}
.scn{font-size:13px;font-weight:600;flex:1;line-height:1.3}
.sc-actions{display:flex;gap:3px;flex-shrink:0}
.sc-btn{font-size:11px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted)}
.sc-btn:hover{background:#F0EDE8;color:var(--text)}
.sc-btn.del:hover{background:#FEF2F2;color:#DC2626;border-color:#FCA5A5}
.scr{font-size:11px;color:var(--muted);margin-top:1px}
.scm{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:9px;font-weight:500}
.tn{background:#EAF5EE;color:#2C6E49}.tf{background:#FCEEE9;color:#C4572A}.ta{background:#F0EBF8;color:#7B5EA7}.tc{background:#E6F2FB;color:#1D6FA4}
.db{font-size:10px;color:var(--muted);background:#F0EDE8;border-radius:7px;padding:2px 6px}
.nc{font-size:10px;color:#92400E;background:#FEF3C7;border-radius:7px;padding:2px 6px}
.scnote{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.drag-hint{font-size:10px;color:var(--muted);text-align:center;padding:5px 0 2px;opacity:.7;flex-shrink:0}
.addrow{margin:5px 10px 7px;padding:7px;border-radius:7px;border:1px dashed var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;width:calc(100% - 20px);text-align:center;flex-shrink:0}
.addrow:hover{border-color:var(--accent);color:var(--accent)}
/* itinerary */
.itinerary-inner{display:flex;flex-direction:column;height:100%;overflow:hidden;min-width:340px}
.ihead{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ihead-title{font-size:13px;font-weight:600}
.adddaybtn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--accent);color:var(--accent);background:none;cursor:pointer}
.adddaybtn:hover{background:var(--accent);color:#fff}
.dcon{flex:1;overflow-y:auto;padding:8px}
.day-block{border:1px solid var(--border);border-radius:9px;margin-bottom:8px;overflow:hidden}
.day-block.dov{border-color:var(--accent);box-shadow:0 0 0 2px rgba(44,110,73,.15)}
.day-block.active-day{border-color:var(--accent);border-width:2px}
.dh{background:#F7F5F0;padding:7px 10px;display:flex;align-items:center;gap:6px;cursor:pointer}
.dh:hover{background:#eeecea}
.dnum{font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap}
.dtit{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtt{font-size:11px;color:var(--muted);background:#fff;border-radius:7px;padding:2px 6px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.dtt.over{color:#DC2626;border-color:#FCA5A5}
.dbody{padding:6px;min-height:36px}
.drop-hint{font-size:11px;color:#bbb;text-align:center;padding:7px 0;border:1.5px dashed #E0DDD6;border-radius:6px;margin:2px 0}
.drop-hint.active{border-color:var(--accent);color:var(--accent);background:#F0FDF4}
/* stop row — fixed layout */
.srow{border-bottom:1px solid #F0EDE8;padding:6px 4px}
.srow:last-child{border-bottom:none}
.srow-main{display:flex;align-items:center;gap:4px}
.srow-handle{font-size:12px;color:#ccc;padding:0 2px;flex-shrink:0;cursor:grab}
.sdot2{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.srow-name{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdel{font-size:11px;color:#ccc;cursor:pointer;border:none;background:none;padding:2px 5px;border-radius:3px;flex-shrink:0}
.sdel:hover{color:#DC2626;background:#FEF2F2}
.srow-meta{display:flex;align-items:center;gap:6px;margin-top:5px;padding-left:22px;flex-wrap:wrap}
.time-lbl{font-size:10px;color:var(--muted);white-space:nowrap}
.time-input{width:76px;border:1px solid var(--border);border-radius:5px;padding:3px 5px;font-size:11px;background:var(--bg);color:var(--text)}
.dur-input{width:52px;border:1px solid var(--border);border-radius:5px;padding:3px 4px;font-size:11px;background:var(--bg);color:var(--text);text-align:center}
.stop-note-input{width:100%;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-size:11px;background:var(--bg);color:var(--text);margin-top:4px;margin-left:22px;width:calc(100% - 26px);font-family:inherit}
.stop-note-input::placeholder{color:#bbb}
.drive-row{display:flex;align-items:center;gap:3px;padding:3px 0 3px 14px;font-size:10px;color:#1D6FA4}
/* budget */
.bpanel{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
/* members */
.member-section{background:#F7F5F0;border-radius:8px;padding:10px 12px}
.member-section h4{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text)}
.member-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.member-tag{display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px}
.member-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:12px;padding:0 2px}
.member-del:hover{color:#DC2626}
.member-add-row{display:flex;gap:6px}
.member-add-row input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--panel);color:var(--text)}
.member-add-row button{padding:5px 10px;border-radius:6px;border:1px solid var(--accent);color:var(--accent);background:none;font-size:12px;cursor:pointer;white-space:nowrap}
.member-add-row button:hover{background:var(--accent);color:#fff}
/* expense list */
.expense-section h4{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text)}
.ei{border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;background:var(--panel)}
.ei-top{display:flex;align-items:center;gap:6px}
.ei-name{font-size:12px;font-weight:500;flex:1}
.ei-payer{font-size:10px;color:#2C6E49;background:#EAF5EE;padding:2px 7px;border-radius:10px;white-space:nowrap}
.ei-amt{font-size:13px;font-weight:600;min-width:70px;text-align:right}
.ei-splits{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
.ei-split-chip{font-size:10px;padding:2px 7px;border-radius:10px;background:#F0EDE8;color:var(--muted)}
.ei-del{font-size:11px;color:#ccc;cursor:pointer;border:none;background:none;padding:2px 4px;border-radius:3px}
.ei-del:hover{color:#DC2626}
.adde{padding:7px;border-radius:7px;border:1px dashed var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;width:100%}
.adde:hover{border-color:var(--accent);color:var(--accent)}
/* settlement */
.settle-section{background:#EAF5EE;border-radius:8px;padding:10px 12px}
.settle-section h4{font-size:12px;font-weight:600;margin-bottom:8px;color:#2C6E49}
.settle-row{font-size:12px;padding:4px 0;border-bottom:1px solid rgba(44,110,73,.1);display:flex;align-items:center;gap:6px}
.settle-row:last-child{border-bottom:none}
.settle-from{font-weight:500;color:#DC2626}
.settle-to{font-weight:500;color:#2C6E49}
.settle-amt{margin-left:auto;font-weight:600}
/* modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.ov.on{display:flex}
.modal{background:var(--panel);border-radius:13px;padding:20px;width:500px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.fg{margin-bottom:11px}
.fg label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.fg textarea{resize:vertical;min-height:52px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mfooter{display:flex;justify-content:flex-end;gap:7px;margin-top:14px}
.btn{padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text);font-family:inherit}
.btn:hover{background:#F0EDE8}
.btnp{background:var(--accent);color:#fff;border-color:var(--accent)}.btnp:hover{background:#235A3C}
.divider{display:flex;align-items:center;gap:8px;margin:10px 0;color:var(--muted);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.gmap-row{display:flex;gap:6px}
.gmap-row input{flex:1;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text);font-family:inherit}
.gmap-row button{padding:7px 12px;border-radius:6px;border:1px solid var(--accent);color:var(--accent);background:none;font-size:12px;cursor:pointer;white-space:nowrap}
.gmap-row button:hover{background:var(--accent);color:#fff}
.gres2{font-size:11px;margin-top:5px;line-height:1.6;color:var(--muted)}
.gres2.ok{color:#2C6E49}.gres2.err{color:#DC2626}.gres2.ing{color:#1D6FA4}
.swrap{position:relative}
.swrap input{padding-right:52px}
.sbtn{position:absolute;right:4px;top:50%;transform:translateY(-50%);padding:4px 8px;font-size:11px;border-radius:5px;border:1px solid var(--accent);color:var(--accent);background:none;cursor:pointer}
.sbtn:hover{background:var(--accent);color:#fff}
.sres{font-size:11px;margin-top:3px;min-height:14px}
.sres.ok{color:#2C6E49}.sres.err{color:#DC2626}.sres.ing{color:#1D6FA4}
/* split table in expense modal */
.split-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.split-table th{text-align:left;padding:4px 6px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:11px}
.split-table td{padding:4px 6px;border-bottom:1px solid #F0EDE8}
.split-table tr:last-child td{border-bottom:none}
.split-input{width:70px;border:1px solid var(--border);border-radius:5px;padding:3px 5px;font-size:12px;background:var(--bg);color:var(--text);text-align:right}
.split-check{width:16px;height:16px;cursor:pointer}
.split-mode{display:flex;gap:6px;margin-bottom:8px}
.split-mode button{flex:1;padding:5px 0;border-radius:6px;border:1px solid var(--border);background:none;font-size:11px;cursor:pointer;color:var(--muted)}
.split-mode button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
/* mobile */
.mob-bar{display:none}#mob-main{display:none}
@media(max-width:700px){
  .lpanel{display:none!important}
  .rdrawer{display:none!important}
  .rdrawer-toggle{display:none!important}
  .day-filter-bar{display:none!important}
  .layout{display:none!important}
  .mob-bar{display:flex!important}
  #mob-main{display:flex!important}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D0CCC4;border-radius:2px}
.empty{text-align:center;padding:24px 12px;color:var(--muted);font-size:12px;line-height:1.7}
.empty-icon{font-size:24px;margin-bottom:6px}

/* ── MOBILE MAIN UI ── */
#mob-main{
  flex-direction:column;
  height:calc(100vh - 52px);
  overflow:hidden;
  background:var(--bg);
}
#mob-main .mob-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0}
#mob-map-view{flex:1;min-height:0}

.mob-tabnav{
  display:flex;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.mob-tabnav-btn{
  flex:1;padding:10px 0 8px;font-size:12px;text-align:center;
  border:none;background:none;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.mob-tabnav-btn .icon{font-size:16px}
.mob-tabnav-btn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.mob-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
/* itinerary view */
.mob-day{margin:12px 14px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--panel)}
.mob-day-hd{padding:10px 14px;background:#F7F5F0;border-bottom:1px solid var(--border)}
.mob-day-hd-top{display:flex;align-items:center;justify-content:space-between}
.mob-day-num{font-size:14px;font-weight:700;color:var(--accent)}
.mob-day-time{font-size:12px;color:var(--muted)}
.mob-day-region{font-size:11px;color:var(--muted);margin-top:2px}
.mob-stop{padding:10px 14px;border-bottom:1px solid #F0EDE8;display:flex;align-items:flex-start;gap:10px}
.mob-stop:last-child{border-bottom:none}
.mob-stop-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.mob-stop-body{flex:1}
.mob-stop-name{font-size:14px;font-weight:500}
.mob-stop-meta{font-size:12px;color:var(--muted);margin-top:2px}
.mob-stop-note{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.mob-drive{padding:5px 14px 5px 38px;font-size:11px;color:#1D6FA4;background:var(--panel)}
/* spot list */
.mob-spot{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:flex-start;gap:10px}
.mob-spot-icon{font-size:20px;flex-shrink:0}
.mob-spot-body{flex:1}
.mob-spot-name{font-size:14px;font-weight:500}
.mob-spot-meta{font-size:11px;color:var(--muted);margin-top:2px}
.mob-spot-note{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
/* budget */
.mob-section{padding:12px 14px}
.mob-section-title{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.mob-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mob-stat{background:var(--panel);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.mob-stat-val{font-size:18px;font-weight:600}
.mob-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.mob-settle{background:#EAF5EE;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.mob-settle-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px}
.mob-settle-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid rgba(44,110,73,.15);font-size:13px}
.mob-settle-row:last-child{border-bottom:none}
.mob-exp-item{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel)}
.mob-exp-top{display:flex;align-items:center;gap:8px}
.mob-exp-name{font-size:13px;font-weight:500;flex:1}
.mob-exp-amt{font-size:14px;font-weight:600}
.mob-exp-payer{font-size:10px;color:#2C6E49;background:#EAF5EE;padding:2px 7px;border-radius:10px}
.mob-exp-splits{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.mob-exp-chip{font-size:10px;padding:2px 7px;border-radius:10px;background:#F0EDE8;color:var(--muted)}
/* add buttons */
.mob-add{margin:10px 14px;padding:12px;border-radius:8px;border:1px dashed var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;width:calc(100% - 28px);text-align:center}
.mob-add:active{background:#F0EDE8}
/* edit mode overlay */
.mob-edit-overlay{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column}
.mob-edit-header{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.mob-edit-title{font-size:15px;font-weight:600;flex:1}

// Wait for Firebase module to load
let _fbReady = false;
document.addEventListener('firebase-ready', () => { _fbReady = true; });

function fbDb(){ return window._FB?.db; }
function fbRef(path){ return window._FB?.ref(fbDb(), path); }

// Save data to Firebase path
async function fbSet(path, value){
  await waitForFB();
  await window._FB.set(fbRef(path), value);
}

// Wait for Firebase to be ready
function waitForFB(timeout=10000){
  if(window._FB) return Promise.resolve();
  return new Promise((resolve,reject)=>{
    const t=setTimeout(()=>reject(new Error('Firebase timeout')),timeout);
    document.addEventListener('firebase-ready',()=>{clearTimeout(t);resolve();},{once:true});
  });
}

// Get data from Firebase path once
async function fbGet(path){
  await waitForFB();
  const snap = await window._FB.get(fbRef(path));
  return snap.exists() ? snap.val() : null;
}

// Listen to Firebase path for real-time updates
function fbListen(path, callback){
  waitForFB().then(()=>{
    window._FB.onValue(fbRef(path), snap => {
      callback(snap.exists() ? snap.val() : null);
    });
  }).catch(()=>{});
}

// Robust fetch with timeout (kept for compatibility)
async function fetchWithTimeout(url, options={}, ms=10000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  try{
    const r=await fetch(url,{...options,signal:ctrl.signal});
    clearTimeout(timer);return r;
  }catch(e){clearTimeout(timer);throw e;}
}

// Save a key-value (Firebase version)
async function saveToSheets(key, value){
  return fbSet('data/'+key.replace(/[.#$/[\]]/g,'_'), value);
}

function rk(r){
  if(!r)return '';
  if(r.includes('基督城'))return '基督城';
  if(r.includes('特卡波')||r.includes('普卡基')||r.includes('湖區'))return '湖區';
  if(r.includes('庫克'))return '庫克山';
  if(r.includes('皇后'))return '皇后鎮';
  if(r.includes('瓦納卡'))return '瓦納卡';
  if(r.includes('峽灣')||r.includes('蒂阿瑙'))return '峽灣';
  if(r.includes('但尼丁'))return '但尼丁';
  if(r.includes('西海岸'))return '西海岸';
  return r;
}
function getDrv(a,b){const ka=rk(a),kb=rk(b);return DRV[ka+'-'+kb]||DRV[kb+'-'+ka]||null;}

// OSRM: fetch real drive time between two spots by coordinate
async function fetchDriveTime(spotA, spotB){
  if(!spotA?.lat||!spotA?.lng||!spotB?.lat||!spotB?.lng) return null;
  const key=`${spotA.id}_${spotB.id}`;
  const keyR=`${spotB.id}_${spotA.id}`;
  if(G.driveCache[key]!=null) return G.driveCache[key];
  if(G.driveCache[keyR]!=null) return G.driveCache[keyR];
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${spotA.lng},${spotA.lat};${spotB.lng},${spotB.lat}?overview=false`;
    const r=await fetch(url);
    const d=await r.json();
    if(d.code==='Ok'&&d.routes?.length){
      const hrs=Math.round(d.routes[0].duration/360)/10; // round to 0.1h
      G.driveCache[key]=hrs;
      return hrs;
    }
  }catch(e){}
  return null;
}

async function fetchDayDriveTimes(day){
  const promises=[];
  for(let i=0;i<day.stops.length-1;i++){
    const a=G.spots.find(x=>x.id===+day.stops[i].sid);
    const b=G.spots.find(x=>x.id===+day.stops[i+1].sid);
    if(a&&b) promises.push(fetchDriveTime(a,b));
  }
  await Promise.all(promises);
  renderDays();
  if(G.map) renderMkrs();
}

// get drive time between two spots — real if cached, fallback to table
function getDriveTime(spotA, spotB){
  if(!spotA||!spotB) return null;
  const key=`${spotA.id}_${spotB.id}`;
  const keyR=`${spotB.id}_${spotA.id}`;
  if(G.driveCache[key]!=null) return G.driveCache[key];
  if(G.driveCache[keyR]!=null) return G.driveCache[keyR];
  // fallback to region table
  return getDrv(spotA.region, spotB.region);
}
function fmtH(h){if(!h&&h!==0)return '—';if(h<1)return Math.round(h*60)+'分';if(h===Math.floor(h))return h+'h';return Math.floor(h)+'h'+Math.round((h%1)*60)+'m';}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──
document.addEventListener('DOMContentLoaded',function(){
  G.spots=[]; // start empty, filled when project is opened
  G.members=['旅伴A','旅伴B'];
  renderAll();
  // Wait for Firebase then load project list
  function onFirebaseReady(){
    loadProjects(); // load project list in background
  }
  if(window._FB_READY){
    onFirebaseReady();
  } else {
    document.addEventListener('firebase-ready', onFirebaseReady);
  }
  // Google Maps initialized via callback (initGoogleMap)
  if(isMobile()) G.map=null;
  loadFromSheets();
  // init toggle position
  const tog=document.getElementById('rdtoggle');
  if(tog)tog.style.right=G.drawerOpen?'340px':'0px';
  // mobile init
  if(isMobile()){
    // set default day to "today" based on trip start
    const sv=document.getElementById('tstart').value;
    if(sv){
      const diff=Math.floor((new Date()-new Date(sv))/(1000*60*60*24));
      G._mobDay=Math.max(1,Math.min(diff+1,G.days.length||1));
    }
    renderMobContent();
  }
});

function renderAll(){renderSpots();renderDays();renderBudget();renderDayFilterBar();if(G.map)renderMkrs();if(isMobile())renderMobContent();}

    content=G.days.map(day=>{

      return `<div class="mob-edit-day" id="day${day.id}"

      const sh=day.stops.reduce((a,s)=>a+(s.dur||0),0);
      const dh=calcDrv(day);
      const rows=day.stops.map((st,i)=>{
        const sp=G.spots.find(x=>x.id===+st.sid); // coerce sid to number
        const clr=sp?CCLR[sp.cat]:'#888';
        const dt=st.startTime||computeTime(day,i);
        let drv='';

// ── DAYS ──
function rebuildDays(){
  const n=parseInt(document.getElementById('tdays').value)||10;
  const sv=document.getElementById('tstart').value;
  const base=sv?new Date(sv):null;
  const old=[...G.days];
  G.days=[];
  for(let i=1;i<=n;i++){
    const ex=old.find(d=>d.num===i);
    let ds='';
    if(base){const d=new Date(base);d.setDate(d.getDate()+i-1);ds=`${d.getMonth()+1}/${d.getDate()}`;}
    G.days.push(ex?{...ex,date:ds||ex.date}:{id:Date.now()+i,num:i,date:ds,stops:[]});
  }
  if(G.activeDay&&!G.days.find(d=>d.id===G.activeDay))G.activeDay=null;
  renderDays();renderDayFilterBar();if(G.map)renderMkrs();autoSave();
}
function addDay(){G.days.push({id:Date.now(),num:G.days.length+1,date:'',stops:[]});renderDays();renderDayFilterBar();}
function calcDrv(day){
  let h=0;
  const stops=Array.isArray(day.stops)?day.stops:[];
  for(let i=0;i<stops.length-1;i++){
    const a=G.spots.find(x=>x.id===+stops[i].sid);
    const b=G.spots.find(x=>x.id===+stops[i+1].sid);
    if(a&&b){const d=getDriveTime(a,b);if(d)h+=d;}
  }
  return h;
}
function dayReg(day){
  const stops=Array.isArray(day.stops)?day.stops:[];
  const rs=[...new Set(stops.map(st=>{const s=G.spots.find(x=>x.id===+st.sid);return s?rk(s.region):'';}).filter(Boolean))];
  return rs.length?rs.join(' → '):'—';
}
function computeTime(day,idx){
  let lastT='09:00',lastI=0;
  for(let j=idx;j>=0;j--){if(day.stops[j].startTime){lastT=day.stops[j].startTime;lastI=j;break;}}
  let offMin=0;
  for(let j=lastI;j<idx;j++){
    offMin+=Math.round((day.stops[j].dur||0)*60);
    if(j<day.stops.length-1){
      const a=G.spots.find(x=>x.id===+day.stops[j].sid);
      const b=G.spots.find(x=>x.id===+day.stops[j+1].sid);
      if(a&&b){const d=getDriveTime(a,b);if(d)offMin+=Math.round(d*60);}
    }
  }
  const [hh,mm]=lastT.split(':').map(Number);
  const tot=hh*60+mm+offMin;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}
function renderStopsHTML(day){
  return day.stops.map((st,i)=>{
    const sp=G.spots.find(x=>x.id===+st.sid); // coerce sid to number
    const clr=sp?CCLR[sp.cat]:'#888';
    const dispTime=st.startTime||computeTime(day,i);
    let driveHTML='';
    if(i<day.stops.length-1&&sp){
      const nx=G.spots.find(x=>x.id===+day.stops[i+1].sid);
      if(nx){
        const d=getDriveTime(sp,nx);
        driveHTML=`<div class="drive-row" style="${d?'':'color:#aaa'}">🚗 開車約 ${d?fmtH(d):'計算中…'}</div>`;
      }
    }
    return `<div class="srow" draggable="true"
      ondragstart="onStopDragStart(event,${day.id},${st.id})"
      ondragover="event.preventDefault();event.stopPropagation()"
      ondrop="onStopDrop(event,${day.id},${st.id})">
      <div class="srow-main">
        <span class="srow-handle">⠿</span>
        <div class="sdot2" style="background:${clr}"></div>
        <div class="srow-name">${CICO[sp?sp.cat:'city']} ${esc(st.name)}</div>
        <button class="sdel" onclick="rmStop(${day.id},${st.id})">✕</button>
      </div>
      <div class="srow-meta">
        <span class="time-lbl">開始</span>
        <input class="time-input" type="time" value="${dispTime}"
          onchange="updateStopTime(${day.id},${st.id},this.value)">
        <span class="time-lbl">停留</span>
        <input class="dur-input" type="number" value="${st.dur}" min="0.5" max="48" step="0.5"
          onchange="updateStopDur(${day.id},${st.id},parseFloat(this.value)||0.5)">
        <span class="time-lbl">h</span>
      </div>
      <input class="stop-note-input" type="text" value="${esc(st.note||'')}" placeholder="備註（集合地點、票券資訊…）"
        onchange="updateStopNote(${day.id},${st.id},this.value)">
    </div>${driveHTML}`;
  }).join('');
}
function renderDaysHTML(){
  if(!G.days.length)return '<div class="empty"><div class="empty-icon">📅</div>尚無天數</div>';
  return G.days.map(day=>{
    const stops=Array.isArray(day.stops)?day.stops:[];
    const sh=stops.reduce((a,s)=>a+(s.dur||0),0);
    const dh=calcDrv(day);const th=sh+dh;const ov=th>12;
    const isActive=G.activeDay===day.id;
    return `<div class="day-block${isActive?' active-day':''}" id="day${day.id}"
      ondragover="onDayOver(event,${day.id})"
      ondragleave="onDayLeave(event,${day.id})"
      ondrop="onDayDrop(event,${day.id})">
      <div class="dh" onclick="setActiveDay(${isActive?'null':day.id})">
        <span class="dnum">第 ${day.num} 天${day.date?' · '+day.date:''}</span>
        <span class="dtit">${dayReg(day)}</span>
        <span class="dtt${ov?' over':''}">⏱ ${fmtH(th)}${ov?' ⚠':''}</span>
      </div>
      <div class="dbody">
        ${day.stops.length?renderStopsHTML(day):''}
        <div class="drop-hint" id="drophint${day.id}">拖曳景點至此</div>
      </div>
    </div>`;
  }).join('');
}

function updateStopTime(dayId,stopId,val){const day=G.days.find(d=>d.id===dayId);const st=day?.stops.find(s=>s.id===stopId);if(st){st.startTime=val;renderDays();autoSave();}}
function updateStopDur(dayId,stopId,val){const day=G.days.find(d=>d.id===dayId);const st=day?.stops.find(s=>s.id===stopId);if(st){st.dur=val;renderDays();autoSave();}}
function updateStopNote(dayId,stopId,val){const day=G.days.find(d=>d.id===dayId);const st=day?.stops.find(s=>s.id===stopId);if(st){st.note=val;autoSave();}}
function onDayOver(e,dayId){e.preventDefault();document.getElementById('day'+dayId)?.classList.add('dov');document.getElementById('drophint'+dayId)?.classList.add('active');}
function onDayLeave(e,dayId){const block=document.getElementById('day'+dayId);if(block&&!block.contains(e.relatedTarget)){block.classList.remove('dov');document.getElementById('drophint'+dayId)?.classList.remove('active');}}
function onDayDrop(e,dayId){
  e.preventDefault();
  document.getElementById('day'+dayId)?.classList.remove('dov');
  document.getElementById('drophint'+dayId)?.classList.remove('active');
  if(e.dataTransfer.getData('type')==='spot'){
    const sid=parseInt(e.dataTransfer.getData('sid'));
    const spot=G.spots.find(x=>x.id===sid);
    const day=G.days.find(d=>d.id===dayId);
    if(!spot||!day)return;
    day.stops.push({id:Date.now(),sid,name:spot.name,dur:spot.dur,startTime:'',note:''});
    renderAll();autoSave();
    // fetch real drive times for this day
    fetchDayDriveTimes(day);
  }
}
function onStopDragStart(e,dayId,stopId){
  G.dragDayId=dayId;G.dragStopId=stopId;
  e.dataTransfer.setData('type','stop');
  e.dataTransfer.setData('stopId',String(stopId));
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
}
function onStopDrop(e,dayId,stopId){
  e.preventDefault();e.stopPropagation();
  if(e.dataTransfer.getData('type')!=='stop')return;
  if(G.dragStopId===null||G.dragDayId!==dayId||G.dragStopId===stopId)return;
  const day=G.days.find(d=>d.id===dayId);if(!day)return;
  const fi=day.stops.findIndex(s=>s.id===G.dragStopId);
  const ti=day.stops.findIndex(s=>s.id===stopId);
  if(fi<0||ti<0)return;
  const[item]=day.stops.splice(fi,1);day.stops.splice(ti,0,item);
  G.dragStopId=null;G.dragDayId=null;
  renderAll();autoSave();
}
function rmStop(dayId,stopId){
  const day=G.days.find(d=>d.id===dayId);if(!day)return;
  day.stops=day.stops.filter(s=>s.id!==stopId);
  renderAll();autoSave();
}

// settlement algorithm: minimize transactions
function calcSettlement(){
  const bal={};
  G.members.forEach(m=>bal[m]=0);
  G.exps.forEach(e=>{
    if(bal[e.payer]===undefined)bal[e.payer]=0;
    bal[e.payer]+=e.amt;
    Object.entries(e.splits||{}).forEach(([k,v])=>{
      if(bal[k]===undefined)bal[k]=0;
      bal[k]-=v;
    });
  });
  // greedy settle
  const creditors=[],debtors=[];
  Object.entries(bal).forEach(([k,v])=>{
    if(v>0.5)creditors.push({name:k,amt:v});
    else if(v<-0.5)debtors.push({name:k,amt:-v});
  });
  const txns=[];
  let ci=0,di=0;
  while(ci<creditors.length&&di<debtors.length){
    const pay=Math.min(creditors[ci].amt,debtors[di].amt);
    if(pay>0.5)txns.push({from:debtors[di].name,to:creditors[ci].name,amt:pay});
    creditors[ci].amt-=pay;debtors[di].amt-=pay;
    if(creditors[ci].amt<0.5)ci++;
    if(debtors[di].amt<0.5)di++;
  }
  return txns;
}

let splitData={};
function setSplitMode(mode){
  G.splitMode=mode;
  ['equal','custom','pct'].forEach(m=>document.getElementById('split-btn-'+m)?.classList.toggle('on',m===mode));
  if(mode==='equal')autoSplitEqual();
  else renderSplitTable();
}
function autoSplitEqual(){
  if(G.splitMode!=='equal')return;
  const amt=parseFloat(document.getElementById('eamt')?.value)||0;
  const checked=Object.entries(splitData).filter(([,v])=>v.checked).map(([k])=>k);
  const n=checked.length||G.members.length;
  const share=n>0?Math.round((amt/n)*100)/100:0;
  G.members.forEach(m=>{if(!splitData[m])splitData[m]={checked:true,val:0};splitData[m].val=splitData[m].checked?share:0;});
  renderSplitTable();
}
function renderSplitTable(){
  const amt=parseFloat(document.getElementById('eamt')?.value)||0;
  const tbody=document.getElementById('split-tbody');if(!tbody)return;
  tbody.innerHTML=G.members.map(m=>{
    if(!splitData[m])splitData[m]={checked:true,val:0};
    const sd=splitData[m];
    const val=G.splitMode==='pct'?((sd.val/amt*100)||0).toFixed(1):sd.val.toFixed(2);
    return `<tr>
      <td><input type="checkbox" class="split-check" ${sd.checked?'checked':''} onchange="toggleSplit('${m}',this.checked)"></td>
      <td>${esc(m)}</td>
      <td><input class="split-input" type="number" value="${val}" min="0" step="${G.splitMode==='pct'?'1':'0.01'}"
        onchange="updateSplit('${m}',parseFloat(this.value)||0)" ${!sd.checked?'disabled':''}></td>
    </tr>`;
  }).join('');
  updateRemaining();
}
function toggleSplit(member,checked){
  if(!splitData[member])splitData[member]={checked:true,val:0};
  splitData[member].checked=checked;
  if(!checked)splitData[member].val=0;
  if(G.splitMode==='equal')autoSplitEqual();
  else renderSplitTable();
}
function updateSplit(member,val){
  if(!splitData[member])splitData[member]={checked:true,val:0};
  if(G.splitMode==='pct'){const amt=parseFloat(document.getElementById('eamt')?.value)||0;splitData[member].val=Math.round(amt*val/100*100)/100;}
  else splitData[member].val=val;
  updateRemaining();
}
function updateRemaining(){
  const amt=parseFloat(document.getElementById('eamt')?.value)||0;
  const used=Object.values(splitData).reduce((a,v)=>a+(v.checked?v.val:0),0);
  const rem=Math.round((amt-used)*100)/100;
  const el=document.getElementById('split-remaining');
  if(el){el.textContent=rem.toFixed(2);el.style.color=Math.abs(rem)<0.1?'#2C6E49':'#DC2626';}
}

async function importGmap(){
  const raw=document.getElementById('gmurl').value.trim();
  const el=document.getElementById('gmres');
  if(!raw){el.textContent='請貼入網址';el.className='gres2 err';return;}
  el.textContent='解析中…';el.className='gres2 ing';

  // First try to parse coordinates directly from URL
  let lat=null,lng=null,name='';
  let m=raw.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);}
  if(!lat){m=raw.match(/!3d(-?\d+\.\d+).*?!4d(-?\d+\.\d+)/);if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);}}
  const nm=raw.match(/\/place\/([^/@?]+)/);
  if(nm)name=decodeURIComponent(nm[1].replace(/\+/g,' '));

  // If short URL or no coords found, use Apps Script to resolve
  if(!lat&&(raw.includes('maps.app.goo.gl')||raw.includes('goo.gl')||!lat)){
    el.textContent='透過伺服器解析短網址…';el.className='gres2 ing';
    try{
      const r=await fetch(SCRIPT_URL,{
        method:'POST',
        body:JSON.stringify({action:'resolveUrl',url:raw})
      });
      const d=await r.json();
      if(d.success){
        lat=d.lat;lng=d.lng;
        if(d.name&&!name)name=d.name;
      } else {
        el.textContent='❌ '+(d.error||'無法解析此連結');el.className='gres2 err';
        return;
      }
    }catch(e){
      el.textContent='❌ 伺服器解析失敗，請確認網路連線';el.className='gres2 err';
      return;
    }
  }

  if(lat&&lng){
    G.plat=lat;G.plng=lng;
    if(name&&!document.getElementById('sname').value)document.getElementById('sname').value=name;
    // reverse geocode for better name
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh`);
      const d=await r.json();
      const n=d.name||d.display_name?.split(',')[0]||name;
      if(!document.getElementById('sname').value)document.getElementById('sname').value=n;
      el.textContent='✅ 找到：'+n+' ('+lat.toFixed(4)+', '+lng.toFixed(4)+')';el.className='gres2 ok';
    }catch(e){
      el.textContent='✅ 座標已取得 ('+lat.toFixed(4)+', '+lng.toFixed(4)+')';el.className='gres2 ok';
    }
    if(G.map){G.map.setCenter({lat,lng});G.map.setZoom(16);}
  } else {
    el.textContent='❌ 找不到座標，請嘗試在 Google Maps 右鍵點擊景點直接複製座標';
    el.className='gres2 err';
  }
}
function applyManualCoord(){
  const lat=parseFloat(document.getElementById('s-lat').value);
  const lng=parseFloat(document.getElementById('s-lng').value);
  const el=document.getElementById('coord-res');
  if(isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180){
    el.textContent='請輸入有效的座標';el.className='sres err';return;
  }
  G.plat=lat;G.plng=lng;
  el.textContent='✅ 座標已設定 ('+lat.toFixed(4)+', '+lng.toFixed(4)+')';el.className='sres ok';
  if(G.map){G.map.setCenter({lat,lng});G.map.setZoom(16);}
}

async function geocode(){
  const q=document.getElementById('sname').value.trim();if(!q)return;
  const el=document.getElementById('sres');
  el.textContent='搜尋中…';el.className='sres ing';
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' New Zealand')}&format=json&limit=1&accept-language=zh`);
    const d=await r.json();
    if(!d.length){el.textContent='找不到，請嘗試英文名稱或貼 Google Maps 網址';el.className='sres err';return;}
    G.plat=parseFloat(d[0].lat);G.plng=parseFloat(d[0].lon);
    el.textContent=`✅ ${d[0].display_name.split(',').slice(0,2).join(',')}`;el.className='sres ok';
    if(G.map)G.map.flyTo([G.plat,G.plng],13,{duration:.7});
  }catch(e){el.textContent='搜尋失敗，請確認網路';el.className='sres err';}
}

  else if(G_mobTab==='spots') el.innerHTML=renderMobSpots();
  else el.innerHTML=renderMobBudget();
}

// ── MOBILE ITINERARY ──
function renderMobItin(){
  if(!G.days.length||!G.days.some(d=>d.stops.length)){
    return '<div class="empty" style="padding:40px"><div style="font-size:32px;margin-bottom:12px">📅</div>尚無行程<br><small>請用電腦版安排行程</small></div>';
  }

  // figure out "today" based on trip start date
  const startVal=document.getElementById('tstart').value;
  let todayDayNum=1;
  if(startVal){
    const start=new Date(startVal);
    const today=new Date();
    const diff=Math.floor((today-start)/(1000*60*60*24));
    todayDayNum=Math.max(1,Math.min(diff+1,G.days.length));
  }

  // day selector tabs
  const dayTabs=G.days.filter(d=>d.stops.length).map(d=>`
    <button onclick="selectMobDay(${d.num})"
      id="mob-day-tab-${d.num}"
      style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;font-size:12px;cursor:pointer;font-weight:${G._mobDay===d.num?'600':'400'};background:${G._mobDay===d.num?'var(--accent)':'rgba(255,255,255,0.15)'};color:${G._mobDay===d.num?'#fff':'rgba(255,255,255,0.85)'}">
      第${d.num}天${d.date?' '+d.date:''}
    </button>`).join('');

  const selectedDay=G.days.find(d=>d.num===(G._mobDay||todayDayNum))||G.days.find(d=>d.stops.length);
  if(!selectedDay)return '<div class="empty" style="padding:40px">尚無行程</div>';

  // stops for selected day
  const sh=selectedDay.stops.reduce((a,s)=>a+(s.dur||0),0);
  const dh=calcDrv(selectedDay);

  const stopCards=selectedDay.stops.map((st,i)=>{
    const sp=G.spots.find(x=>x.id===+st.sid);
    const clr=sp?CCLR[sp.cat]:'#888';
    const dt=st.startTime||computeTime(selectedDay,i);
    const hasCoord=sp&&sp.lat&&sp.lng;
    const navUrl=hasCoord?`https://www.google.com/maps/dir/?api=1&destination=${sp.lat},${sp.lng}&travelmode=driving`:'';

    let driveCard='';
    if(i<selectedDay.stops.length-1&&sp){
      const nx=G.spots.find(x=>x.id===+selectedDay.stops[i+1].sid);
      if(nx){
        const d=getDriveTime(sp,nx);
        if(d){
          const nextCoord=nx.lat&&nx.lng?`https://www.google.com/maps/dir/?api=1&origin=${sp.lat},${sp.lng}&destination=${nx.lat},${nx.lng}&travelmode=driving`:'';
          driveCard=`<div style="display:flex;align-items:center;padding:8px 16px;gap:8px;background:#EFF6FF;border-bottom:1px solid #DBEAFE">
            <span style="font-size:18px">🚗</span>
            <div style="flex:1">
              <div style="font-size:12px;color:#1D6FA4;font-weight:500">開車約 ${fmtH(d)}</div>
              <div style="font-size:11px;color:#93C5FD">前往 ${esc(nx.name)}</div>
            </div>
            ${nextCoord?`<a href="${nextCoord}" target="_blank" style="font-size:11px;padding:5px 10px;background:#1D6FA4;color:#fff;border-radius:6px;text-decoration:none;white-space:nowrap">🗺 導航</a>`:''}
          </div>`;
        }
      }
    }

    return `<div style="border-bottom:1px solid var(--border)">
      <div style="padding:14px 16px;display:flex;align-items:flex-start;gap:12px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:44px">
          <div style="font-size:11px;font-weight:600;color:var(--muted)">${dt}</div>
          <div style="width:12px;height:12px;border-radius:50%;background:${clr};border:2px solid #fff;box-shadow:0 0 0 2px ${clr}"></div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:600;color:var(--text);line-height:1.3">${CICO[sp?sp.cat:'city']} ${esc(st.name)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">停留 ${fmtH(st.dur)}${sp?(' · '+esc(sp.region)):''}</div>
          ${st.note?`<div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4;background:#F7F5F0;padding:6px 8px;border-radius:6px">${esc(st.note)}</div>`:''}
          ${sp&&sp.note&&sp.note!==st.note?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${esc(sp.note)}</div>`:''}
        </div>
        ${hasCoord?`<a href="${navUrl}" target="_blank" style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;flex-shrink:0;font-size:10px;font-weight:500">
          <span style="font-size:20px">📍</span>導航
        </a>`:`<div style="width:52px"></div>`}
      </div>
    </div>${driveCard}`;
  }).join('');

  return `<!-- day selector -->
  <div style="background:var(--accent);padding:10px 12px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0" id="mob-day-tabs">
    ${dayTabs}
  </div>
  <!-- day summary -->
  <div style="background:#F0FDF4;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #BBF7D0;flex-shrink:0">
    <div>
      <div style="font-size:12px;font-weight:600;color:var(--accent)">${dayReg(selectedDay)||'行程'}</div>
      <div style="font-size:11px;color:var(--muted)">共 ${selectedDay.stops.length} 個景點 · ⏱ ${fmtH(sh+dh)}</div>
    </div>
    <button onclick="openMobEditItin()" style="font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--accent);color:var(--accent);background:#fff;cursor:pointer">✏️ 編輯</button>
  </div>
  <!-- stops -->
  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch">
    ${stopCards}
  </div>`;
}

async function importGmap(){
  const raw=document.getElementById('gmurl').value.trim();
  const el=document.getElementById('gmres');
  if(!raw){el.textContent='請貼入網址';el.className='gres2 err';return;}
  el.textContent='解析中…';el.className='gres2 ing';

  // First try to parse coordinates directly from URL
  let lat=null,lng=null,name='';
  let m=raw.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);}
  if(!lat){m=raw.match(/!3d(-?\d+\.\d+).*?!4d(-?\d+\.\d+)/);if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);}}
  const nm=raw.match(/\/place\/([^/@?]+)/);
  if(nm)name=decodeURIComponent(nm[1].replace(/\+/g,' '));

  // If short URL or no coords found, use Apps Script to resolve
  if(!lat&&(raw.includes('maps.app.goo.gl')||raw.includes('goo.gl')||!lat)){
    el.textContent='透過伺服器解析短網址…';el.className='gres2 ing';
    try{
      const r=await fetch(SCRIPT_URL,{
        method:'POST',
        body:JSON.stringify({action:'resolveUrl',url:raw})
      });
      const d=await r.json();
      if(d.success){
        lat=d.lat;lng=d.lng;
        if(d.name&&!name)name=d.name;
      } else {
        el.textContent='❌ '+(d.error||'無法解析此連結');el.className='gres2 err';
        return;
      }
    }catch(e){
      el.textContent='❌ 伺服器解析失敗，請確認網路連線';el.className='gres2 err';
      return;
    }
  }

  if(lat&&lng){
    G.plat=lat;G.plng=lng;
    if(name&&!document.getElementById('sname').value)document.getElementById('sname').value=name;
    // reverse geocode for better name
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh`);
      const d=await r.json();
      const n=d.name||d.display_name?.split(',')[0]||name;
      if(!document.getElementById('sname').value)document.getElementById('sname').value=n;
      el.textContent='✅ 找到：'+n+' ('+lat.toFixed(4)+', '+lng.toFixed(4)+')';el.className='gres2 ok';
    }catch(e){
      el.textContent='✅ 座標已取得 ('+lat.toFixed(4)+', '+lng.toFixed(4)+')';el.className='gres2 ok';
    }
    if(G.map){G.map.setCenter({lat,lng});G.map.setZoom(16);}
  } else {
    el.textContent='❌ 找不到座標，請嘗試在 Google Maps 右鍵點擊景點直接複製座標';
    el.className='gres2 err';
  }
}
function applyManualCoord(){
  const lat=parseFloat(document.getElementById('s-lat').value);
  const lng=parseFloat(document.getElementById('s-lng').value);
  const el=document.getElementById('coord-res');
  if(isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180){
    el.textContent='請輸入有效的座標';el.className='sres err';return;
  }
  G.plat=lat;G.plng=lng;
  el.textContent='✅ 座標已設定 ('+lat.toFixed(4)+', '+lng.toFixed(4)+')';el.className='sres ok';
  if(G.map){G.map.setCenter({lat,lng});G.map.setZoom(16);}
}

async function geocode(){
  const q=document.getElementById('sname').value.trim();if(!q)return;
  const el=document.getElementById('sres');
  el.textContent='搜尋中…';el.className='sres ing';
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' New Zealand')}&format=json&limit=1&accept-language=zh`);
    const d=await r.json();
    if(!d.length){el.textContent='找不到，請嘗試英文名稱或貼 Google Maps 網址';el.className='sres err';return;}
    G.plat=parseFloat(d[0].lat);G.plng=parseFloat(d[0].lon);
    el.textContent=`✅ ${d[0].display_name.split(',').slice(0,2).join(',')}`;el.className='sres ok';
    if(G.map)G.map.flyTo([G.plat,G.plng],13,{duration:.7});
  }catch(e){el.textContent='搜尋失敗，請確認網路';el.className='sres err';}
}
function saveSpot(){
  const name=document.getElementById('sname').value.trim();if(!name){alert('請輸入景點名稱');return;}
  const data={name,region:document.getElementById('sreg').value,cat:document.getElementById('scat').value,dur:parseFloat(document.getElementById('sdursel').value),cost:parseFloat(document.getElementById('scost').value)||0,note:document.getElementById('snote').value,lat:G.plat,lng:G.plng};

  } else {
    G.spots.push({id:Date.now(),custom:true,...data});
  }
  closeM('spot');renderAll();autoSave();
}

function applyLoadedData(d){
  if(!d||typeof d!=='object')return;
  if(d.tripDays)document.getElementById('tdays').value=d.tripDays;
  if(d.tripStart)document.getElementById('tstart').value=d.tripStart;
  if(d.members&&d.members.length)G.members=d.members;
  if(d.driveCache&&typeof d.driveCache==='object')Object.assign(G.driveCache,d.driveCache);
  const customSpots=d.customSpots||d.spots||[];
  if(customSpots.length)customSpots.forEach(sp=>{
    if(!G.spots.find(x=>x.id===+sp.id))G.spots.push({...sp,id:+sp.id,custom:true});
  });
  if(d.days&&d.days.length){
    G.days=d.days.map(day=>({...day,stops:Array.isArray(day.stops)?day.stops.map(st=>({...st,sid:+st.sid})):[]}));
  } else {
    rebuildDays();
  }
  if(d.exps&&d.exps.length)G.exps=d.exps;
  renderAll();
  G._lastLoadedStops=G.days.reduce((a,day)=>a+(Array.isArray(day.stops)?day.stops.length:0),0);
}

function openProject(projId){
  const proj=G_PROJ.projects.find(p=>p.id===projId);
  if(!proj)return;
  G_PROJ.current=proj;
  G._currentProjKey=projDataKey(projId);
  localStorage.setItem('lastProjId', projId); // remember for refresh
  // reset state - empty spots, no presets
  G.spots=[];
  G.days=[];G.exps=[];G.members=['旅伴A','旅伴B'];G.driveCache={};G._lastLoadedStops=0;G._mobDay=1;
  // update topbar
  document.getElementById('proj-title').textContent=proj.name;
  document.getElementById('tdays').value=proj.days||7;
  if(proj.startDate)document.getElementById('tstart').value=proj.startDate;
  // DON'T rebuildDays or autoSave yet — wait for Sheets data first
  hideProjScreen();
  setSt('ing','載入中…');
  // reset map to destination center (Google Maps)
  if(G.map){
    const dest=(proj.destination||'').toLowerCase();
    let lat=-44.5,lng=169.5,zoom=7;
    if(dest.includes('日本'))     {lat=35.6762;lng=139.6503;zoom=6;}
    else if(dest.includes('泰國')) {lat=13.7563;lng=100.5018;zoom=6;}
    else if(dest.includes('韓國')) {lat=37.5665;lng=126.9780;zoom=7;}
    else if(dest.includes('歐洲')) {lat=48.8566;lng=2.3522;zoom=5;}
    G.map.setCenter({lat,lng});
    G.map.setZoom(zoom);
  }
  fbGet('data/'+G._currentProjKey.replace(/[.#$[\]]/g,'_'))
    .then(d=>{
      if(d&&typeof d==='object'&&(d.days||d.customSpots||d.exps)){
        // restore from sheets
        applyLoadedData(d);
        G._lastLoadedStops=G.days.reduce((a,day)=>a+day.stops.length,0);
        setSt('ok','已載入 '+proj.name);
      } else {
        // nothing saved yet, build fresh
        rebuildDays();
        setSt('ok',proj.name+' (新行程)');
      }
      renderAll();
      if(isMobile())renderMobContent();
      G.days.forEach(day=>fetchDayDriveTimes(day));
      // set up real-time listener for other users' changes
      if(G._fbUnlisten)G._fbUnlisten(); // remove previous listener
      const listenKey='data/'+G._currentProjKey.replace(/[.#$[\]]/g,'_');
      fbListen(listenKey,(data)=>{
        if(!data||!G_PROJ.current)return;
        if(data.savedAt&&data.savedAt===G._lastSavedAt)return; // skip own saves
        applyLoadedData(data);
        G._lastLoadedStops=G.days.reduce((a,d)=>a+d.stops.length,0);
        renderAll();
        if(isMobile())renderMobContent();
        setSt('ok','已同步（即時）');
      });
    })
    .catch((err)=>{
      console.error('openProject load failed:', err);
      rebuildDays();
      renderAll();
      if(isMobile())renderMobContent();
      setSt('err','載入失敗，請按 ↻ 重新載入');
    });
}

async function createProject(){
  const name=document.getElementById('proj-name').value.trim();
  const dest=document.getElementById('proj-dest').value.trim()||G_PROJ.selectedDest;
  const date=document.getElementById('proj-date').value;
  const days=parseInt(document.getElementById('proj-days').value)||7;
  if(!name){alert('請輸入旅行名稱');return;}

  const btn=document.querySelector('#proj-modal-bg .proj-btn-primary');
  if(btn){btn.textContent='處理中…';btn.disabled=true;}

  if(G_PROJ.editingId){
    const p=G_PROJ.projects.find(x=>x.id===G_PROJ.editingId);
    if(p)Object.assign(p,{name,destination:dest,startDate:date,days});
    // save in background, don't block
    saveToSheets(PROJECTS_KEY,G_PROJ.projects).catch(()=>{});
    closeProjModal();renderProjList();
    if(G_PROJ.current?.id===G_PROJ.editingId){
      document.getElementById('proj-title').textContent=name;
      document.getElementById('tdays').value=days;
      if(date)document.getElementById('tstart').value=date;
    }
  } else {
    const proj={id:'p'+Date.now(),name,destination:dest,startDate:date,days,createdAt:new Date().toISOString()};
    G_PROJ.projects.push(proj);
    closeProjModal(); // close immediately
    openProject(proj.id); // jump in immediately
    // save project list in background
    saveToSheets(PROJECTS_KEY,G_PROJ.projects).catch(()=>{});
  }
}

async function deleteProject(projId,name){
  // Two-step confirmation to prevent accidental deletion
  if(!confirm('⚠️ 確定要刪除「'+name+'」嗎？\n\n此操作無法復原，所有行程、景點、費用資料將永久消失。'))return;
  const typed=prompt('請輸入專案名稱「'+name+'」確認刪除：');
  if(typed===null)return; // cancelled
  if(typed.trim()!==name){alert('名稱不符，已取消刪除。');return;}
  G_PROJ.projects=G_PROJ.projects.filter(p=>p.id!==projId);
  saveToSheets(PROJECTS_KEY,G_PROJ.projects).catch(()=>{});
  saveToSheets(projDataKey(projId),{}).catch(()=>{});
  renderProjList();
  if(G_PROJ.current?.id===projId){G_PROJ.current=null;showProjScreen();}
}

// ── override push ──
function push(){
  if(!G_PROJ.current){return;}
  if(!window._FB){setSt('err','Firebase 未就緒');return;}
  const lastLoadedStops=G._lastLoadedStops||0;
  const currentStops=G.days.reduce((a,d)=>a+d.stops.length,0);
  if(lastLoadedStops>2&&currentStops===0&&!G.spots.some(s=>s.custom)){setSt('err','⚠ 資料異常，已暫停同步');return;}
  setSt('ing','儲存中…');
  const customSpots=G.spots.filter(s=>s.custom===true);
  const pl={customSpots,days:G.days,exps:G.exps,members:G.members,driveCache:G.driveCache,
    tripDays:document.getElementById('tdays').value,
    tripStart:document.getElementById('tstart').value,
    savedAt:new Date().toISOString()};G._lastSavedAt=pl.savedAt;
  const key=G._currentProjKey||'proj_default_data';
  saveToSheets(key,pl)
    .then(()=>{
      setSt('ok','已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
      const bk='proj_'+(G_PROJ.current?.id||'x')+'_backup_'+((G._backupSlot||0)%5);
      G._backupSlot=(G._backupSlot||0)+1;
      saveToSheets(bk,{...pl,backupTime:new Date().toLocaleString('zh-TW')}).catch(()=>{});
    })
    .catch(()=>setSt('err','同步失敗'));
}

// ── override loadFromSheets ──
function loadFromSheets(){
  if(!G_PROJ.current)return;
  setSt('ing','載入中…');
  const key=G._currentProjKey||'proj_default_data';
  fbGet('data/'+key.replace(/[.#$[\]]/g,'_'))
    .then(d=>{
      if(!d||typeof d!=='object'||(!d.days&&!d.customSpots&&!d.spots&&!d.exps)){rebuildDays();setSt('ok','已連線（新行程）');return;}
      applyLoadedData(d);
      G._lastLoadedCustom=G.spots.filter(s=>s.custom).length;
      G._backupSlot=0;
      setSt('ok','已載入 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
      G.days.forEach(day=>fetchDayDriveTimes(day));
    }).catch(()=>setSt('err','載入失敗'));
}

// ── override restoreBackup ──
async function restoreBackup(){
  if(!G_PROJ.current){alert('請先選擇專案');return;}
  if(!window._FB){alert('Firebase 未就緒');return;}
  setSt('ing','載入備份…');
  try{
    const pid=G_PROJ.current.id;
    const slots=await Promise.all([0,1,2,3,4].map(async i=>{
      const key='data/proj_'+pid+'_backup_'+i;
      const d=await fbGet(key);
      return {slot:i,data:d};
    }));
    const valid=slots.filter(s=>s.data?.backupTime);
    if(!valid.length){setSt('err','無備份可用');return;}
    const opts=valid.map(v=>v.slot+': '+v.data.backupTime).join('\n');
    const choice=prompt('選擇備份（輸入數字）:\n'+opts);
    if(choice===null)return;
    const sel=valid.find(v=>String(v.slot)===choice.trim());
    if(!sel){alert('無效選擇');return;}
    if(!confirm('復原至 '+sel.data.backupTime+'？'))return;
    applyLoadedData(sel.data);setSt('ok','已復原');
  }catch(e){setSt('err','復原失敗');}
}

let G_infoWindow = null;

function initGoogleMap(){
  if(isMobile()) return;
  const proj = G_PROJ.current;
  let center = {lat:-44.5,lng:169.5}, zoom = 7;
  if(proj){
    const dest=(proj.destination||'').toLowerCase();
    if(dest.includes('日本'))     {center={lat:35.6762,lng:139.6503};zoom=6;}
    else if(dest.includes('泰國')) {center={lat:13.7563,lng:100.5018};zoom=6;}
    else if(dest.includes('韓國')) {center={lat:37.5665,lng:126.9780};zoom=7;}
    else if(dest.includes('歐洲')) {center={lat:48.8566,lng:2.3522};zoom=5;}
  }
  G.map = new google.maps.Map(document.getElementById('map'), {
    center, zoom,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });
  G_infoWindow = new google.maps.InfoWindow();

  // Single click handler - checks for POI first, then falls back to coordinate click
  G.map.addListener('click', async (e) => {
    if(e.placeId){
      // Clicked on a Google Maps POI - use new Places API
      e.stop();
      try{
        const {Place} = await google.maps.importLibrary('places');
        const place = new Place({id: e.placeId});
        await place.fetchFields({fields: ['displayName','location','formattedAddress','regularOpeningHours','rating']});
        showPlacePopupNew(place, e.latLng.lat(), e.latLng.lng());
      }catch(err){
        // Fallback to coordinate popup
        showMapClickPopup(e.latLng.lat(), e.latLng.lng());
      }
    } else {
      // Clicked on empty map area
      showMapClickPopup(e.latLng.lat(), e.latLng.lng());
    }
  });

  renderMkrs();
  initMapSearch();
}

function showMapClickPopup(lat, lng){
  // Use Geocoding API to get location name
  try{
    const geocoder = new google.maps.Geocoder();
    geocoder.geocode({location:{lat,lng},language:'zh-TW'}, (results, status) => {
      let name = '';
      if(status === 'OK' && results && results.length > 0){
        // Try to get a meaningful name from address components
        const r = results[0];
        const comp = r.address_components || [];
        // prefer establishment, point_of_interest, or first component
        const useful = comp.find(c=>c.types.includes('establishment')||c.types.includes('point_of_interest'));
        name = useful?.long_name || comp[0]?.long_name || r.formatted_address.split(',')[0];
      }
      _showClickContent(lat, lng, name);
    });
  }catch(e){
    _showClickContent(lat, lng, '');
  }
}

function _showClickContent(lat, lng, name){
  const safeN = (name||'').replace(/'/g,"\'").replace(/"/g,'&quot;');
  const content = `<div style="min-width:200px;font-family:inherit">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">${name||'此位置'}</div>
    <div style="font-size:11px;color:#666;margin-bottom:10px">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
    <button onclick="quickAddSpot('${safeN}',${lat},${lng})"
      style="width:100%;padding:7px;background:#2C6E49;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">
      ＋ 加入景點庫
    </button>
  </div>`;
  G_infoWindow.setContent(content);
  G_infoWindow.setPosition({lat,lng});
  G_infoWindow.open(G.map);
}

function showPlacePopup(place){
  // Legacy - kept for compatibility
  showPlacePopupNew(place, 0, 0);
}

function showPlacePopupNew(place, fallbackLat, fallbackLng){
  // New Places API format
  const name = place.displayName || place.name || '';
  const addr = place.formattedAddress || place.formatted_address || '';
  const rating = place.rating ? `⭐ ${place.rating}` : '';
  let lat, lng;
  try{
    lat = place.location?.lat() ?? fallbackLat;
    lng = place.location?.lng() ?? fallbackLng;
  }catch(e){
    lat = fallbackLat; lng = fallbackLng;
  }
  const isOpen = place.regularOpeningHours?.isOpen?.();
  const hours = isOpen === true ? '🟢 現在開放' : isOpen === false ? '🔴 現在關閉' : '';
  const safeN = name.replace(/'/g,"\'").replace(/"/g,'&quot;');

  const content = `<div style="min-width:220px;font-family:inherit">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">${name}</div>
    ${rating?`<div style="font-size:12px;color:#f59e0b;margin-bottom:2px">${rating}</div>`:''}
    ${hours?`<div style="font-size:12px;margin-bottom:4px">${hours}</div>`:''}
    <div style="font-size:11px;color:#888;margin-bottom:10px">${addr}</div>
    <button onclick="quickAddSpot('${safeN}',${lat},${lng})"
      style="width:100%;padding:8px;background:#2C6E49;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">
      ＋ 加入景點庫
    </button>
  </div>`;
  G_infoWindow.setContent(content);
  G_infoWindow.setPosition({lat, lng});
  G_infoWindow.open(G.map);
}

function quickAddSpot(name, lat, lng){
  G_infoWindow.close();
  // Open spot modal with pre-filled data
  openM('spot');
  setTimeout(()=>{
    if(name) document.getElementById('sname').value = name;

    if(el){el.textContent=`✅ 座標已取得 (${lat.toFixed(4)}, ${lng.toFixed(4)})`;el.className='gres2 ok';}

function renderMkrs(){
  if(!G.map) return;
  // Clear existing markers
  G_markers.forEach(m=>m.setMap(null));
  G_markers = [];
  // Clear day stop markers
  if(G._markers){ G._markers.forEach(m=>m.setMap(null)); }
  G._markers = [];
  // Clear existing polylines
  if(G._polylines){ G._polylines.forEach(p=>p.setMap(null)); }
  G._polylines = [];

  // Get days to show - use G.activeDay (set by day filter bar)
  const filterDay = G.activeDay || G._dayFilter;
  let targetDays = filterDay ? G.days.filter(d=>d.id===filterDay) : G.days;

  // Collect spot ids from targetDays only (for highlighting)
  const itinSpotIds = new Set(targetDays.flatMap(d=>(d.stops||[]).map(st=>+st.sid)));

  // Add spot markers (only spots in current view)
  G.spots.forEach(sp=>{
    if(!sp.lat||!sp.lng) return;
    const clr = {nature:'#2C6E49',food:'#E07A5F',activity:'#F4A261',city:'#1D6FA4'}[sp.cat]||'#888';
    const inItin = itinSpotIds.has(sp.id);
    const marker = new google.maps.Marker({
      position:{lat:+sp.lat,lng:+sp.lng},
      map: G.map,
      title: sp.name,
      icon:{
        path: google.maps.SymbolPath.CIRCLE,
        scale: inItin ? 10 : 7,
        fillColor: clr,
        fillOpacity: inItin ? 1 : 0.5,
        strokeColor: '#fff',
        strokeWeight: 2,
      }
    });
    marker.addListener('click', ()=>{
      const content=`<div style="min-width:180px;font-family:inherit">
        <div style="font-size:14px;font-weight:600">${esc(sp.name)}</div>
        <div style="font-size:12px;color:#666;margin-top:3px">${esc(sp.region)} · ⏱${fmtH(sp.dur)}</div>
        ${sp.note?`<div style="font-size:11px;color:#888;margin-top:4px">${esc(sp.note)}</div>`:''}
      </div>`;
      G_infoWindow.setContent(content);
      G_infoWindow.open(G.map, marker);
    });
    G_markers.push(marker);
  });

  // Draw route for each day SEPARATELY with numbered stop markers
  const dayColors = ['#2C6E49','#1D6FA4','#E07A5F','#F4A261','#9B59B6','#E74C3C','#2ECC71'];
  targetDays.forEach((day,di)=>{
    const clr = dayColors[di%dayColors.length];
    const stops = Array.isArray(day.stops)?day.stops:[];
    const ptsData = stops.map((st,si)=>{
      const sp=G.spots.find(x=>x.id===+st.sid);
      if(!sp||!sp.lat||!sp.lng) return null;
      return {lat:+sp.lat, lng:+sp.lng, name:sp.name, order:si+1, day:day.num};
    }).filter(Boolean);

    if(ptsData.length>1){
      // Draw polyline for this day only
      const poly = new google.maps.Polyline({
        path: ptsData.map(p=>({lat:p.lat,lng:p.lng})),
        geodesic: true,
        strokeColor: clr,
        strokeOpacity: 0.85,
        strokeWeight: 3,
        map: G.map
      });
      G._polylines.push(poly);
    }

    // Add numbered stop markers on top of spot markers
    ptsData.forEach(p=>{
      const stopMarker = new google.maps.Marker({
        position:{lat:p.lat,lng:p.lng},
        map: G.map,
        label:{text:'D'+p.day+'-'+p.order, color:'#fff', fontSize:'9px', fontWeight:'700'},
        icon:{
          path: google.maps.SymbolPath.CIRCLE,
          scale: 12,
          fillColor: clr,
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2,
        },
        zIndex: 10
      });
      G._markers.push(stopMarker);
    });
  });
}

function expandMobDay(dayId, row){
  // Toggle insert positions for this day
  const insertDiv = document.getElementById('mob-inserts-' + dayId);
  if(!insertDiv) return;

  if(insertDiv.style.display !== 'none'){
    insertDiv.style.display = 'none';
    return;
  }

  const day = G.days.find(d=>d.id===dayId);
  if(!day) return;
  const stops = Array.isArray(day.stops) ? day.stops : [];

  if(!stops.length){
    // Empty day - just one add button
    insertDiv.innerHTML = `<div class="mob-empty-day-btn" onclick="mobInsertSpot(${dayId}, 0)">
      ＋ 加入此天
    </div>`;
  } else {
    // Show insert positions between stops
    let html = `<div class="mob-insert-btn" onclick="mobInsertSpot(${dayId}, 0)">
      <div class="mob-insert-line"></div>
      <div class="mob-insert-plus">插入最前面</div>
      <div class="mob-insert-line"></div>
    </div>`;

    stops.forEach((st, i) => {
      html += `<div style="padding:6px 16px;font-size:12px;color:var(--muted);background:#F7F5F0">
        ${i+1}. ${esc(st.name)}
      </div>`;
      html += `<div class="mob-insert-btn" onclick="mobInsertSpot(${dayId}, ${i+1})">
        <div class="mob-insert-line"></div>
        <div class="mob-insert-plus">${i===stops.length-1?'插入最後面':'插入此處'}</div>
        <div class="mob-insert-line"></div>
      </div>`;
    });

    insertDiv.innerHTML = html;
  }

  insertDiv.style.display = 'block';
}

function mobInsertSpot(dayId, position){
  const day = G.days.find(d=>d.id===dayId);
  const sp = G.spots.find(x=>x.id===G_mobAddSpotId);
  if(!day||!sp) return;

  const stops = Array.isArray(day.stops) ? day.stops : [];
  const newStop = {id:Date.now(), sid:sp.id, name:sp.name, dur:sp.dur, startTime:'', note:''};
  stops.splice(position, 0, newStop);
  day.stops = stops;

  closeMobAddDay();
  renderMobContent(); // refresh mobile view
  autoSave();

  // Show confirmation
  setSt('ok', sp.name + ' 已加入第' + day.num + '天');
}

function closeMobAddDay(e){
  if(e && e.target !== document.getElementById('mob-add-day-overlay')) return;
  document.getElementById('mob-add-day-overlay').style.display = 'none';
  G_mobAddSpotId = null;
}


// ── MAP SEARCH ──
let G_searchService = null;
let G_autocomplete = null;

let _autocomplete = null;
let _searchTimer = null;

function initMapSearch(){
  if(!google?.maps?.places) return;
  const input = document.getElementById('map-search-input');
  if(!input) return;

  // Use Google Places Autocomplete
  _autocomplete = new google.maps.places.Autocomplete(input, {
    fields: ['name','geometry','formatted_address','rating','opening_hours','types'],
    language: 'zh-TW'
  });

  // Bias to current map center
  if(G.map) _autocomplete.bindTo('bounds', G.map);

  // When user selects a suggestion
  _autocomplete.addListener('place_changed', ()=>{
    const place = _autocomplete.getPlace();
    if(!place.geometry) return;
    const lat = place.geometry.location.lat();
    const lng = place.geometry.location.lng();
    const name = place.name || input.value;

    // Fly map to location
    if(G.map){
      G.map.setCenter({lat, lng});
      G.map.setZoom(16);
    }

    // Show add popup
    const rating = place.rating ? '⭐ '+place.rating : '';
    const addr = place.formatted_address || '';
    const safeN = name.replace(/'/g,"\'").replace(/"/g,'&quot;');
    const content = `<div style="min-width:220px;font-family:inherit">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">${esc(name)}</div>
      ${rating?`<div style="font-size:12px;color:#f59e0b;margin-bottom:2px">${rating}</div>`:''}
      <div style="font-size:11px;color:#888;margin-bottom:10px">${esc(addr)}</div>
      <button onclick="quickAddSpot('${safeN}',${lat},${lng})"
        style="width:100%;padding:8px;background:#2C6E49;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">
        ＋ 加入景點庫
      </button>
    </div>`;
    if(G_infoWindow && G.map){
      G_infoWindow.setContent(content);
      G_infoWindow.setPosition({lat,lng});
      G_infoWindow.open(G.map);
    }
  });

  // Bind search button
  const btn = document.getElementById('map-search-btn');
  if(btn) btn.addEventListener('click', searchMapPlace);

  // Enter key
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){ e.preventDefault(); searchMapPlace(); }
  });
}

function debounceSearch(){
  clearTimeout(_searchTimer);
  const q = document.getElementById('map-search-input').value.trim();
  if(!q){ hideSearchResults(); return; }
  _searchTimer = setTimeout(()=>searchMapPlace(), 500);
}

async function searchMapPlace(){
  const q = document.getElementById('map-search-input').value.trim();
  if(!q){ alert('請輸入景點名稱'); return; }

  const resultsEl = document.getElementById('map-search-results');
  if(!resultsEl){ console.error('results div not found'); return; }
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:#888">搜尋中…</div>';

  try{
    if(!google?.maps?.importLibrary){ resultsEl.innerHTML='<div style="padding:12px;color:red">地圖未載入，請重新整理</div>'; return; }
    const {Place} = await google.maps.importLibrary('places');
    
    // Get current map center as location bias
    const center = G.map ? G.map.getCenter() : null;
    
    const request = {
      textQuery: q,
      fields: ['displayName','location','formattedAddress','rating','types'],
      locationBias: center ? {
        center: center,
        radius: 50000 // 50km radius bias (max allowed)
      } : undefined,
      maxResultCount: 6,
      language: 'zh-TW'
    };

    const {places} = await Place.searchByText(request);
    
    if(!places || !places.length){
      resultsEl.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:#888">找不到結果，試試英文名稱</div>';
      return;
    }

    resultsEl.innerHTML = places.map((p,i) => {
      const name = p.displayName || '';
      const addr = p.formattedAddress || '';
      const lat = p.location?.lat();
      const lng = p.location?.lng();
      const icon = getPlaceIcon(p.types || []);
      return `<div class="map-search-result" onclick="selectSearchResult(${i})">
        <div class="map-search-result-icon">${icon}</div>
        <div>
          <div class="map-search-result-name">${esc(name)}</div>
          <div class="map-search-result-addr">${esc(addr)}</div>
        </div>
      </div>`;
    }).join('');

    // Store results for selection
    window._searchResults = places;

  }catch(err){
    console.error('Search error:', err);
    resultsEl.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:#c00">搜尋失敗，請確認網路</div>';
  }
}

function getPlaceIcon(types){
  if(types.includes('restaurant')||types.includes('food')) return '🍽️';
  if(types.includes('lodging')) return '🏨';
  if(types.includes('natural_feature')||types.includes('park')) return '🏔️';
  if(types.includes('museum')) return '🏛️';
  if(types.includes('airport')) return '✈️';
  if(types.includes('tourist_attraction')) return '📍';
  return '📌';
}

function selectSearchResult(index){
  const place = window._searchResults?.[index];
  if(!place) return;

  const lat = place.location?.lat();
  const lng = place.location?.lng();
  const name = place.displayName || '';
  const addr = place.formattedAddress || '';

  // Hide search results
  hideSearchResults();
  document.getElementById('map-search-input').value = name;

  // Fly map to location
  if(G.map && lat && lng){
    G.map.setCenter({lat, lng});
    G.map.setZoom(16);
  }

  // Show popup to add to library
  const rating = place.rating ? '⭐ '+place.rating : '';
  const safeN = name.replace(/'/g,"\'").replace(/"/g,'&quot;');
  const content = `<div style="min-width:220px;font-family:inherit">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">${esc(name)}</div>
    ${rating?`<div style="font-size:12px;color:#f59e0b;margin-bottom:2px">${rating}</div>`:''}
    <div style="font-size:11px;color:#888;margin-bottom:10px">${esc(addr)}</div>
    <button onclick="quickAddSpot('${safeN}',${lat},${lng})"
      style="width:100%;padding:8px;background:#2C6E49;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">
      ＋ 加入景點庫
    </button>
  </div>`;
  if(G_infoWindow && G.map){
    G_infoWindow.setContent(content);
    G_infoWindow.setPosition({lat, lng});
    G_infoWindow.open(G.map);
  }
}

function hideSearchResults(){
  const el = document.getElementById('map-search-results');
  if(el) el.style.display = 'none';
  window._searchResults = null;
}

// Close search results when clicking elsewhere
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.map-search-wrap')) hideSearchResults();
});


// ── MOBILE MAP ──
let G_mobMap = null;
let G_mobMapListOpen = false;
let G_mobMapDay = null;

function initMobMap(){
  if(!isMobile()) return;
  const mapEl = document.getElementById('mob-gmap');
  if(!mapEl) return;

  // init map if not yet done
  if(!G_mobMap && typeof google !== 'undefined'){
    const proj = G_PROJ.current;
    let center = {lat:-44.5,lng:169.5}, zoom = 7;
    if(proj){
      const dest=(proj.destination||'').toLowerCase();
      if(dest.includes('日本'))     {center={lat:35.6762,lng:139.6503};zoom=6;}
      else if(dest.includes('泰國')) {center={lat:13.7563,lng:100.5018};zoom=6;}
      else if(dest.includes('韓國')) {center={lat:37.5665,lng:126.9780};zoom=7;}
      else if(dest.includes('歐洲')) {center={lat:48.8566,lng:2.3522};zoom=5;}
    }
    G_mobMap = new google.maps.Map(mapEl, {
      center, zoom,
      mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
      zoomControl:true
    });
  }

  // Render day selector
  renderMobDayBar();
  // Show today's stops on map
  showMobMapDay(G._mobDay||1);
}

function renderMobDayBar(){
  const bar = document.getElementById('mob-day-bar');
  if(!bar) return;
  const daysWithStops = G.days.filter(d=>d.stops.length);
  if(!daysWithStops.length){ bar.innerHTML='<div style="color:rgba(255,255,255,.7);font-size:12px;padding:4px 0">尚無行程</div>'; return; }

  bar.innerHTML = daysWithStops.map(d=>`
    <button onclick="showMobMapDay(${d.num})" id="mob-day-btn-${d.num}"
      style="flex-shrink:0;padding:5px 14px;border-radius:20px;border:none;font-size:12px;cursor:pointer;
        font-weight:${G._mobDay===d.num?'600':'400'};
        background:${G._mobDay===d.num?'#fff':'rgba(255,255,255,0.2)'};
        color:${G._mobDay===d.num?'var(--accent)':'rgba(255,255,255,0.9)'}">
      第${d.num}天${d.date?' '+d.date:''}
    </button>`).join('');
}

function showMobMapDay(dayNum){
  G._mobDay = dayNum;
  G_mobMapDay = dayNum;
  renderMobDayBar();

  const day = G.days.find(d=>d.num===dayNum);
  if(!day||!G_mobMap) return;

  // Clear old markers
  if(G._mobMapMarkers){ G._mobMapMarkers.forEach(m=>m.setMap(null)); }
  G._mobMapMarkers = [];

  const stops = Array.isArray(day.stops)?day.stops:[];
  const pts = [];

  stops.forEach((st,i)=>{
    const sp = G.spots.find(x=>x.id===+st.sid);
    if(!sp||!sp.lat||!sp.lng) return;
    const lat=+sp.lat, lng=+sp.lng;
    pts.push({lat,lng});
    const clr = {nature:'#2C6E49',food:'#E07A5F',activity:'#F4A261',city:'#1D6FA4'}[sp.cat]||'#888';
    const marker = new google.maps.Marker({
      position:{lat,lng}, map:G_mobMap, title:sp.name,
      label:{text:String(i+1),color:'#fff',fontSize:'12px',fontWeight:'600'},
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:clr,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
    });
    // Click marker to show info
    (function(spot, stopObj, idx){
      marker.addListener('click', ()=>{
        const navUrl=spot.lat&&spot.lng?`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}&travelmode=driving`:'';
        const dt=stopObj.startTime||'';
        if(!G._mobInfoWindow) G._mobInfoWindow=new google.maps.InfoWindow();
        G._mobInfoWindow.setContent(`<div style="font-family:inherit;min-width:160px">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px">${esc(spot.name)}</div>
          <div style="font-size:11px;color:#666;margin-bottom:8px">${dt?'⏰ '+dt+' · ':''}⏱ ${fmtH(stopObj.dur)}</div>
          ${navUrl?`<a href="${navUrl}" target="_blank" style="display:block;text-align:center;padding:7px;background:#2C6E49;color:#fff;border-radius:6px;text-decoration:none;font-size:12px;font-weight:500">📍 Google Maps 導航</a>`:''}
        </div>`);
        G._mobInfoWindow.open(G_mobMap, marker);
      });
    })(sp, st, i);
    G._mobMapMarkers.push(marker);
  });

  // Draw route
  if(pts.length>1){
    if(G._mobPolyline) G._mobPolyline.setMap(null);
    G._mobPolyline = new google.maps.Polyline({
      path:pts, geodesic:true, strokeColor:'#2C6E49', strokeOpacity:.7, strokeWeight:2, map:G_mobMap
    });
  }

  // Fit bounds
  if(pts.length>0){
    const bounds = new google.maps.LatLngBounds();
    pts.forEach(p=>bounds.extend(p));
    G_mobMap.fitBounds(bounds, {top:60,bottom:80,left:20,right:20});
  }

  // Update list
  updateMobDayList(day);
}

function updateMobDayList(day){
  const title = document.getElementById('mob-day-list-title');
  const content = document.getElementById('mob-day-list-content');
  if(!title||!content) return;
  const stops = Array.isArray(day.stops)?day.stops:[];
  title.textContent = `第 ${day.num} 天${day.date?' · '+day.date:''} · ${stops.length} 個景點`;
  content.innerHTML = stops.map((st,i)=>{
    const sp = G.spots.find(x=>x.id===+st.sid);
    const dt = st.startTime||computeTime(day,i);
    const navUrl = sp&&sp.lat&&sp.lng?`https://www.google.com/maps/dir/?api=1&destination=${sp.lat},${sp.lng}&travelmode=driving`:'';
    return `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px"
      onclick="G_mobMap&&G_mobMap.setCenter({lat:${+sp?.lat||0},lng:${+sp?.lng||0}});G_mobMap&&G_mobMap.setZoom(16)">
      <div style="width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${i+1}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${CICO[sp?sp.cat:'city']} ${esc(st.name)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${dt} · 停留 ${fmtH(st.dur)}</div>
      </div>
      ${navUrl?`<a href="${navUrl}" target="_blank" onclick="event.stopPropagation()"
        style="padding:6px 10px;background:var(--accent);color:#fff;border-radius:6px;text-decoration:none;font-size:11px;flex-shrink:0">📍</a>`:''}
    </div>`;
  }).join('') || '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">尚無景點</div>';
}

function toggleMobMapList(){
  G_mobMapListOpen = !G_mobMapListOpen;
  const list = document.getElementById('mob-day-list');
  const btn = document.getElementById('mob-list-toggle');
  if(list) list.style.transform = G_mobMapListOpen ? 'translateY(0)' : 'translateY(100%)';
  if(btn) btn.textContent = G_mobMapListOpen ? '✕ 關閉' : '📋 今日行程';
}

</script>
